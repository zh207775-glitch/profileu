<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>

  <rect width="900" height="280" fill="#0D1117"/>
  <circle cx="450" cy="140" r="220" fill="url(#glow)"/>

  <!-- faint particle dots -->
  <g fill="#58A6FF">
    <circle cx="80" cy="60" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="70" r="1.2" opacity="0.4"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="220" r="1.1" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="110" cy="215" r="1.3" opacity="0.4"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- monogram mark -->
  <g transform="translate(450,72)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="none" stroke="url(#accent)" stroke-width="1.4" opacity="0.8"/>
    <text x="0" y="9" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="url(#accent)" text-anchor="middle">ZH</text>
  </g>

  <!-- name -->
  <text x="450" y="150" font-family="Inter, Segoe UI, sans-serif" font-size="42" font-weight="700" fill="#F0F6FC" text-anchor="middle" letter-spacing="0.5">
    Zeeshan Haider
  </text>

  <!-- role -->
  <text x="450" y="182" font-family="JetBrains Mono, Consolas, monospace" font-size="15" fill="#8B949E" text-anchor="middle" letter-spacing="1.5">
    FULL STACK ENGINEER
  </text>

  <!-- thin animated accent line -->
  <rect x="450" y="204" width="0" height="2" rx="1" fill="url(#accent)">
    <animate attributeName="width" from="0" to="120" dur="1.4s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" from="450" to="390" dur="1.4s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- stack line -->
  <text x="450" y="235" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#7EE787" text-anchor="middle" opacity="0">
    React · ASP.NET Core · ERPNext
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.6s" fill="freeze"/>
  </text>
</svg>

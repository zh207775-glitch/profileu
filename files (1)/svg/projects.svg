<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <g font-family="Inter, Segoe UI, sans-serif">
    <!-- Card 1 -->
    <g transform="translate(0,0)">
      <rect width="284" height="180" rx="14" fill="#161B22" stroke="url(#pBorder)" stroke-width="1.3"/>
      <rect x="20" y="20" width="34" height="34" rx="8" fill="#0D1117" stroke="#58A6FF" stroke-width="1"/>
      <text x="37" y="43" font-size="16" text-anchor="middle" fill="#58A6FF">◆</text>
      <text x="20" y="80" font-size="17" font-weight="700" fill="#F0F6FC">ERP Business Suite</text>
      <text x="20" y="102" font-size="12.5" fill="#8B949E">Multi-module ERPNext platform —</text>
      <text x="20" y="118" font-size="12.5" fill="#8B949E">inventory, POS, accounting, CRM</text>
      <text x="20" y="155" font-size="11.5" fill="#7EE787" font-family="JetBrains Mono, monospace">ERPNext · Python · REST</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(308,0)">
      <rect width="284" height="180" rx="14" fill="#161B22" stroke="url(#pBorder)" stroke-width="1.3"/>
      <rect x="20" y="20" width="34" height="34" rx="8" fill="#0D1117" stroke="#00E5FF" stroke-width="1"/>
      <text x="37" y="43" font-size="16" text-anchor="middle" fill="#00E5FF">▣</text>
      <text x="20" y="80" font-size="17" font-weight="700" fill="#F0F6FC">Admin Dashboard</text>
      <text x="20" y="102" font-size="12.5" fill="#8B949E">React-based analytics dashboard</text>
      <text x="20" y="118" font-size="12.5" fill="#8B949E">with real-time data visualization</text>
      <text x="20" y="155" font-size="11.5" fill="#7EE787" font-family="JetBrains Mono, monospace">React · Recharts · REST</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(616,0)">
      <rect width="284" height="180" rx="14" fill="#161B22" stroke="url(#pBorder)" stroke-width="1.3"/>
      <rect x="20" y="20" width="34" height="34" rx="8" fill="#0D1117" stroke="#7EE787" stroke-width="1"/>
      <text x="37" y="43" font-size="16" text-anchor="middle" fill="#7EE787">▲</text>
      <text x="20" y="80" font-size="17" font-weight="700" fill="#F0F6FC">POS &amp; Inventory API</text>
      <text x="20" y="102" font-size="12.5" fill="#8B949E">ASP.NET Core backend powering</text>
      <text x="20" y="118" font-size="12.5" fill="#8B949E">retail POS and stock management</text>
      <text x="20" y="155" font-size="11.5" fill="#7EE787" font-family="JetBrains Mono, monospace">ASP.NET Core · SQL Server</text>
    </g>
  </g>
</svg>
